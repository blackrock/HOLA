version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      cargo:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/hola-py"
    schedule:
      interval: "weekly"
    groups:
      pip:
        patterns:
          - "*"

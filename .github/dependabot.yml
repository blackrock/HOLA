version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      cargo:
        patterns:
          - "*"
    # Major bumps of runtime crates (e.g. rand, rand_distr, tower-http) require
    # deliberate source migration, so don't auto-propose them; ship only
    # minor/patch updates and handle majors by hand when there's a reason to.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "pip"
    directory: "/hola-py"
    schedule:
      interval: "weekly"
    groups:
      pip:
        patterns:
          - "*"
    # `ty` is a pre-1.0 (0.0.x) type checker whose diagnostics shift between
    # releases; pin it and upgrade deliberately rather than on every bump.
    ignore:
      - dependency-name: "ty"

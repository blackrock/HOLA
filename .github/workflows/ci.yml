name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Rust: fmt + clippy + test ─────────────────────────
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings

      - name: Test (all features)
        run: cargo test --workspace --all-features

  # ── Python: build bindings + ruff + ty + pytest ───────
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Install dev + benchmark dependencies
        run: uv sync --dev --group benchmarks
        working-directory: hola-py

      - name: Ruff format check
        run: uv run ruff format --check .
        working-directory: hola-py

      - name: Ruff lint
        run: uv run ruff check .
        working-directory: hola-py

      - name: Type check (ty)
        run: uv run ty check .
        working-directory: hola-py

      - name: Build & install wheel
        run: uv run maturin develop
        working-directory: hola-py

      # Use .venv/bin/python after maturin develop to avoid uv re-sync
      # overwriting the editable install with a stale cached wheel.

      - name: Run unit tests
        run: .venv/bin/python -m pytest tests/ -v -m "not examples and not benchmarks and not doctest_md" --timeout=120
        working-directory: hola-py

      - name: Run example smoke tests
        run: .venv/bin/python -m pytest tests/test_examples.py -v --timeout=300
        working-directory: hola-py

      - name: Run benchmark smoke tests
        run: .venv/bin/python -m pytest tests/test_benchmarks_smoke.py -v --timeout=60
        working-directory: hola-py

      - name: Run doc code block tests
        run: .venv/bin/python -m pytest tests/test_doc_examples.py -v --timeout=30
        working-directory: hola-py

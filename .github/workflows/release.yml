name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-release:
    name: Validate Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate tag and package versions
        env:
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          version="${TAG_NAME#v}"
          if [[ "${TAG_NAME}" != v* || -z "${version}" || "${version}" == "${TAG_NAME}" ]]; then
            echo "Release tags must be named v<version>; got ${TAG_NAME}" >&2
            exit 1
          fi

          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          main_sha="$(git rev-parse origin/main)"
          tag_sha="$(git rev-list -n 1 "${TAG_NAME}")"
          if [[ "${tag_sha}" != "${main_sha}" ]]; then
            echo "Release tag ${TAG_NAME} points to ${tag_sha}, but origin/main is ${main_sha}" >&2
            exit 1
          fi

          TAG_VERSION="${version}" python <<'PY'
          import os
          import tomllib
          from pathlib import Path

          version = os.environ["TAG_VERSION"]
          errors: list[str] = []

          pyproject = tomllib.loads(Path("hola-py/pyproject.toml").read_text())
          if pyproject["project"]["version"] != version:
              errors.append(
                  f"hola-py/pyproject.toml project.version is {pyproject['project']['version']!r}, expected {version!r}"
              )

          manifests = [
              Path("opt_engine/Cargo.toml"),
              Path("hola/Cargo.toml"),
              Path("hola-py/Cargo.toml"),
              Path("hola-cli/Cargo.toml"),
          ]
          for manifest in manifests:
              data = tomllib.loads(manifest.read_text())
              package_version = data["package"]["version"]
              if package_version != version:
                  errors.append(f"{manifest} package.version is {package_version!r}, expected {version!r}")
              for section in ("dependencies", "dev-dependencies"):
                  for dep_name, dep in data.get(section, {}).items():
                      if isinstance(dep, dict) and "path" in dep and "version" in dep and dep["version"] != version:
                          errors.append(
                              f"{manifest} {section}.{dep_name}.version is {dep['version']!r}, expected {version!r}"
                          )
              for table, deps in data.items():
                  if not table.startswith("dev-dependencies."):
                      continue
                  if isinstance(deps, dict) and "path" in deps and "version" in deps and deps["version"] != version:
                      errors.append(f"{manifest} {table}.version is {deps['version']!r}, expected {version!r}")

          if errors:
              raise SystemExit("\n".join(errors))
          PY

  # ── Python wheels (abi3 — one per platform) ─────────────
  build-wheels:
    name: Wheel (${{ matrix.os }} ${{ matrix.target }})
    needs: [validate-release]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-15-intel
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up QEMU
        if: matrix.target == 'aarch64' && runner.os == 'Linux'
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Bundle dashboard into wheel
        shell: bash
        run: |
          mkdir -p hola-py/hola_opt/dashboard
          cp dashboard/index.html dashboard/styles.css dashboard/app.js hola-py/hola_opt/dashboard/

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist ${{ runner.os == 'Linux' && '-i python3.10' || '' }}
          manylinux: auto
          working-directory: hola-py
          # ring (via rustls) needs __ARM_ARCH when cross-compiling aarch64 from x86 in manylinux Docker
          docker-options: ${{ matrix.target == 'aarch64' && runner.os == 'Linux' && '-e CFLAGS_aarch64_unknown_linux_gnu=-D__ARM_ARCH=8' || '' }}

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: hola-py/dist/*.whl

  # ── Source distribution ─────────────────────────────────
  build-sdist:
    name: Source distribution
    needs: [validate-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: hola-py

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: hola-py/dist/*.tar.gz

  # ── CLI binaries ────────────────────────────────────────
  build-cli:
    name: CLI (${{ matrix.target }})
    needs: [validate-release]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: hola-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: hola-linux-aarch64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: hola-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: hola-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: hola-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        continue-on-error: true

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build CLI binary
        run: cargo build --release --target ${{ matrix.target }} -p hola-cli
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CFLAGS_aarch64_unknown_linux_gnu: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && '-D__ARM_ARCH=8' || '' }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/hola ${{ matrix.artifact }}
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/hola.exe ${{ matrix.artifact }}
          Compress-Archive -Path ${{ matrix.artifact }} -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.artifact }}
          path: |
            *.tar.gz
            *.zip

  # ── Wheel smoke test ────────────────────────────────────
  test-wheels:
    name: Test wheel (${{ matrix.os }})
    needs: [build-wheels]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Install and test
        shell: bash
        run: |
          pip install hola-opt --no-index --find-links dist/
          python -c "from hola_opt import Study, Space, Real, Minimize; print('Import OK')"
          python -c "from hola_opt import dashboard_dir; assert dashboard_dir().exists(), 'Dashboard not bundled'"

  # ── Create GitHub Release ───────────────────────────────
  release:
    name: GitHub Release
    needs: [build-wheels, build-sdist, build-cli, test-wheels]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}

  # ── Update PEP 503 package index on GitHub Pages ───────
  update-index:
    name: Update Package Index
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate PEP 503 simple index
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p index/simple/hola-opt

          # Collect wheel/sdist download URLs from stable releases. If no stable
          # release exists yet, index only the current prerelease so old RC assets
          # with obsolete package versions do not remain install candidates.
          # gh release view returns browser-downloadable URLs in .assets[].url.
          gh release list --limit 100 --json tagName,isPrerelease \
            --jq '.[] | select(.isPrerelease == false) | .tagName' > /tmp/index_tags.txt
          if [[ ! -s /tmp/index_tags.txt ]]; then
            echo "${CURRENT_TAG}" > /tmp/index_tags.txt
          fi

          while read -r tag; do
            gh release view "$tag" --json assets \
              --jq '[.assets[] | select(.name | test("\\.(whl|tar\\.gz)$")) | .url] | .[]'
          done < /tmp/index_tags.txt | sort -u > /tmp/asset_urls.txt

          if [[ ! -s /tmp/asset_urls.txt ]]; then
            echo "No wheel or sdist assets found for the package index" >&2
            exit 1
          fi

          # Build the per-package index page (PEP 503)
          {
            echo '<!DOCTYPE html><html><body>'
            while IFS= read -r url; do
              filename=$(basename "$url")
              echo "  <a href=\"${url}\">${filename}</a><br/>"
            done < /tmp/asset_urls.txt
            echo '</body></html>'
          } > index/simple/hola-opt/index.html

          # Build the root index page
          cat > index/simple/index.html <<'ROOTHTML'
          <!DOCTYPE html><html><body>
            <a href="hola-opt/">hola-opt</a>
          </body></html>
          ROOTHTML

          echo "Generated index with $(wc -l < /tmp/asset_urls.txt) assets"
          cat index/simple/hola-opt/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./index
          destination_dir: .
          keep_files: false
